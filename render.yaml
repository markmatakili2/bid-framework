services:
  - type: web
    name: tuinnov8-bid
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USER
        sync: false          # set in Render dashboard
      - key: ADMIN_PASS
        sync: false          # set in Render dashboard
      - key: SESSION_SECRET
        generateValue: true  # Render auto-generates a secure secret
      - key: DATABASE_URL
        fromDatabase:
          name: tuinnov8-db
          property: connectionString

databases:
  - name: tuinnov8-db
    plan: free
    databaseName: tuinnov8
    user: tuinnov8
